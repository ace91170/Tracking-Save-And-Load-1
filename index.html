<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>GPS Logger Pro - Fixed View</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        html, body { margin:0; padding:0; height: 100%; width: 100%; overflow: hidden; background: #222; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; background: #333; }
        
        /* UI Overlays */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9000;
            display: flex; justify-content: center; align-items: center; text-align: center;
        }
        
        .status-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: rgba(0,0,0,0.85); color: #00ff00;
            padding: 10px; border-radius: 10px; font-size: 11px;
            text-align: center; border: 1px solid #444; min-width: 280px; pointer-events: none;
        }

        .controls {
            position: absolute; bottom: 20px; right: 10px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px; width: 160px;
        }

        /* Zoom Controls Custom */
        .zoom-controls {
            position: absolute; top: 80px; right: 10px; z-index: 2000;
            display: flex; flex-direction: column; gap: 5px;
        }
        .btn-zoom {
            width: 45px; height: 45px; background: white; border: 1px solid #ccc;
            border-radius: 8px; font-size: 24px; font-weight: bold; color: #333;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .custom-dialog {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 15px; z-index: 8000;
            display: none; flex-direction: column; gap: 10px; width: 280px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-save { background: #28a745; color: white; }
        .btn-cancel { background: #dc3545; color: white; }
        .btn-action { background: #007bff; color: white; }
        .btn-util { background: #6f42c1; color: white; }
        
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        
        #list-container { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .data-row { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
        
        /* Marker Label yang stabil */
        .alt-label { 
            color: #ff0000 !important; font-weight: bold !important; font-size: 10px !important; 
            background: rgba(255,255,255,0.8) !important; border: 1px solid red !important;
            border-radius: 3px; padding: 1px 3px;
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <button class="btn btn-action" style="padding: 30px" onclick="initApp()">🚀 MULAI GPS LOGGER</button>
</div>

<div class="zoom-controls">
    <div class="btn-zoom" onclick="map.zoomIn()">+</div>
    <div class="btn-zoom" onclick="map.zoomOut()">−</div>
</div>

<!-- Dialog Simpan Titik -->
<div id="save-dialog" class="custom-dialog">
    <h3 style="margin:0">Simpan Titik?</h3>
    <p id="coord-info" style="font-size: 12px; color: #666;"></p>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-save" style="flex:1" onclick="confirmSave()">SIMPAN</button>
        <button class="btn btn-cancel" style="flex:1" onclick="closeDialog('save-dialog')">BATAL</button>
    </div>
</div>

<!-- Dialog Ekspor -->
<div id="export-dialog" class="custom-dialog">
    <h3 style="margin:0">Ekspor Data</h3>
    <input type="text" id="filename-input" placeholder="Nama file...">
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-save" style="flex:1" onclick="processExport()">PROSES</button>
        <button class="btn btn-cancel" style="flex:1" onclick="closeDialog('export-dialog')">BATAL</button>
    </div>
</div>

<!-- Modal List Data -->
<div id="data-modal" class="custom-dialog" style="width: 90%; max-width: 400px;">
    <h3 style="margin:0">Daftar Titik</h3>
    <div id="list-container"></div>
    <button class="btn btn-action" onclick="closeDialog('data-modal')">TUTUP</button>
</div>

<div class="status-bar" id="stat">Mencari Satelit...</div>
<div id="map"></div>

<div class="controls">
    <select id="interval-select" style="padding: 10px; border-radius: 8px;">
        <option value="5000">⏱️ 5 Detik</option>
        <option value="15000">⏱️ 15 Detik</option>
        <option value="30000">⏱️ 30 Detik</option>
    </select>
    <button id="auto-btn" class="btn btn-util" onclick="toggleAuto()">🤖 AUTO: OFF</button>
    <button class="btn btn-save" onclick="triggerManualSave()">📍 SIMPAN TITIK</button>
    <button class="btn btn-action" onclick="triggerExport()">💾 EKSPOR (TXT/GPX)</button>
    <button class="btn btn-util" onclick="viewData()">🔍 DATA & HAPUS</button>
    <input type="file" id="upload-input" style="display:none" accept=".txt" onchange="handleUpload(event)">
    <button class="btn btn-util" onclick="document.getElementById('upload-input').click()">📂 UPLOAD TXT</button>
    <button class="btn btn-cancel" onclick="clearAll()">⚠️ RESET ALL</button>
</div>

<script>
let savedCoords = JSON.parse(localStorage.getItem('gps_pro_data')) || [];
let currentPos = null, currentAlt = null;
let map, userMarker, markersLayer;
let isAutoOn = false, autoInterval = null;
let tempPos = null, firstLock = true;

function initApp() {
    document.getElementById('start-overlay').style.display = 'none';
    
    // Inisialisasi peta dengan zoomControl: false karena kita buat custom di atas
    map = L.map('map', { zoomControl: false }).setView([0,0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    markersLayer = L.layerGroup().addTo(map);
    userMarker = L.circleMarker([0,0], { radius: 8, color: '#fff', fillColor: '#007bff', fillOpacity: 1, weight: 2 }).addTo(map);
    
    loadStoredData();
    startGPS();
}

function startGPS() {
    navigator.geolocation.watchPosition(pos => {
        currentPos = [pos.coords.latitude, pos.coords.longitude];
        currentAlt = pos.coords.altitude ? pos.coords.altitude.toFixed(1) : "0.0";
        
        userMarker.setLatLng(currentPos);
        
        // Perbaikan View: Saat pertama kali dapat sinyal, langsung zoom ke posisi (level 18)
        if (firstLock) {
            map.setView(currentPos, 18);
            firstLock = false;
        } else if (!isAutoOn && !document.getElementById('data-modal').style.display === 'flex') {
            // Pan pelan mengikuti posisi jika tidak sedang membuka data
            map.panTo(currentPos);
        }
        updateStatus();
    }, (err) => {
        console.error("GPS Error:", err);
        document.getElementById('stat').innerText = "GPS Error/Akses Ditolak";
    }, { enableHighAccuracy: true, maximumAge: 0 });
}

function updateStatus() {
    if(!currentPos) return;
    document.getElementById('stat').innerHTML = `DATA: ${savedCoords.length} | ZOOM: ${map.getZoom()}<br>LAT: ${currentPos[0].toFixed(6)} | LNG: ${currentPos[1].toFixed(6)} | ALT: ${currentAlt}m`;
}

function triggerManualSave() {
    if (!currentPos) return alert("GPS belum siap!");
    tempPos = { lat: currentPos[0], lng: currentPos[1], alt: currentAlt };
    document.getElementById('coord-info').innerText = `${tempPos.lat.toFixed(6)}, ${tempPos.lng.toFixed(6)} (Alt: ${tempPos.alt}m)`;
    document.getElementById('save-dialog').style.display = 'flex';
}

function confirmSave() {
    const entry = { lat: tempPos.lat, lng: tempPos.lng, alt: tempPos.alt, time: new Date().toISOString() };
    savedCoords.push(entry);
    saveToStorage();
    addMarker(entry);
    closeDialog('save-dialog');
}

function saveToStorage() {
    localStorage.setItem('gps_pro_data', JSON.stringify(savedCoords));
    updateStatus();
}

function addMarker(c) {
    // Retain Tampilan: CircleMarker ukurannya tetap (pixel-based) tidak terpengaruh zoom peta
    const m = L.circleMarker([c.lat, c.lng], { 
        radius: 6, 
        color: '#ff0000', 
        fillColor: '#ff0000', 
        fillOpacity: 0.8,
        weight: 1
    }).addTo(markersLayer);
    
    m.bindTooltip(`${c.alt}m`, { 
        permanent: true, 
        direction: 'bottom',
        className: 'alt-label',
        offset: [0, 5]
    });
}

function loadStoredData() {
    markersLayer.clearLayers();
    savedCoords.forEach(addMarker);
    if (savedCoords.length > 0 && firstLock) {
        const last = savedCoords[savedCoords.length - 1];
        map.setView([last.lat, last.lng], 18);
        firstLock = false;
    }
}

// --- FUNGSI EKSPOR ---
function triggerExport() {
    if (savedCoords.length === 0) return alert("Data kosong!");
    document.getElementById('export-dialog').style.display = 'flex';
}

function processExport() {
    const name = document.getElementById('filename-input').value.trim();
    if (!name) return alert("Nama file wajib diisi!");
    
    // TXT Export
    const txtContent = savedCoords.map(c => `[${c.lat}, ${c.lng}, Alt:${c.alt}m]`).join('\n');
    downloadFile(txtContent, `${name}.txt`, 'text/plain');
    
    // GPX Export
    let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="GPSLogger"><trk><trkseg>`;
    savedCoords.forEach(c => {
        gpx += `\n<trkpt lat="${c.lat}" lon="${c.lng}"><ele>${c.alt}</ele><time>${c.time}</time></trkpt>`;
    });
    gpx += `\n</trkseg></trk></gpx>`;
    downloadFile(gpx, `${name}.gpx`, 'application/gpx+xml');
    
    closeDialog('export-dialog');
}

function downloadFile(content, filename, type) {
    const blob = new Blob([content], { type: type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}

// --- DATA MANAGEMENT ---
function viewData() {
    const container = document.getElementById('list-container');
    container.innerHTML = "";
    savedCoords.forEach((c, index) => {
        const row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = `<div><b>${index+1}.</b> ${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}</div>
                         <button class="btn-cancel" style="padding:5px 10px; font-size:10px" onclick="deletePoint(${index})">HAPUS</button>`;
        row.onclick = () => { map.setView([c.lat, c.lng], 19); closeDialog('data-modal'); };
        container.appendChild(row);
    });
    document.getElementById('data-modal').style.display = 'flex';
}

function deletePoint(index) {
    if (confirm("Hapus titik ini?")) {
        savedCoords.splice(index, 1);
        saveToStorage();
        loadStoredData();
        viewData();
    }
}

function handleUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split('\n');
        const imported = lines.map(line => {
            const match = line.match(/\[(.*), (.*), Alt:(.*)m\]/);
            if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]), alt: match[3], time: new Date().toISOString() };
        }).filter(x => x);
        if (imported.length > 0) {
            savedCoords = [...savedCoords, ...imported];
            saveToStorage();
            loadStoredData();
            alert(`Berhasil impor ${imported.length} titik.`);
        }
    };
    reader.readAsText(file);
}

function toggleAuto() {
    isAutoOn = !isAutoOn;
    const btn = document.getElementById('auto-btn');
    if (isAutoOn) {
        btn.innerText = "🤖 AUTO: ON";
        btn.style.background = "#ffc107";
        autoInterval = setInterval(triggerManualSave, document.getElementById('interval-select').value);
    } else {
        btn.innerText = "🤖 AUTO: OFF";
        btn.style.background = "#6f42c1";
        clearInterval(autoInterval);
    }
}

function closeDialog(id) { document.getElementById(id).style.display = 'none'; }
function clearAll() { if(confirm("Hapus semua data?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
